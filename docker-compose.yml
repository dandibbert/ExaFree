services:
  exa-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-http://deb.debian.org}
    image: exafree:latest
    container_name: exafree
    ports:
      - "7860:7860"
    volumes:
      - ./data:/app/data
    environment:
      # 读取配置的 YAML 文件路径
      CONFIG_FILE: "/app/data/settings.yaml"
      # 启用管理面板
      DISABLE_ADMIN_PANEL: "0"
      # 管理员密钥（旧版 /login 使用；建议设置）
      ADMIN_KEY: "change_me_admin_key"
      # Session 密钥（如仍使用登录接口，务必固定）
      SESSION_SECRET_KEY: "change_me_session_secret"
    restart: unless-stopped
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # 日志限制
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

